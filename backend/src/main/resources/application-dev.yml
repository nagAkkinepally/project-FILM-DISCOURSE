server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: film-discourse

  # H2 in-memory database — no PostgreSQL needed for local dev
  datasource:
    url: jdbc:h2:mem:filmdiscourse;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: true

  # Use simple in-memory cache — no Redis needed
  cache:
    type: simple

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

application:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000
    refresh-expiration: 604800000

  cors:
    allowed-origins: "http://localhost:3000,http://localhost:5173"

  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-duration: 60

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true

logging:
  level:
    root: INFO
    com.filmdiscourse: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{HH:mm:ss} [%-5level] %logger{25} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
